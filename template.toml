name = "pj-base"
version = "0.6.0"

# Language-agnostic boilerplate. Compose with `pj-rust` / `pj-go` /
# `pj-bun` for the language layer, and `pj-{rust,go,bun}-cli` for
# CLI-specific extras.

[[file]]
src = "LICENSE"
how = "overwrite"
when = "once"

# Agent guidance — `AGENTS.md` is the agent-agnostic source of
# truth (Codex reads it directly), `CLAUDE.md` / `GEMINI.md` are
# thin shims that auto-load tools still find. The base layer is
# the language-agnostic conventions block; pj-rust / pj-rust-cli
# add their own marker-bracketed sections in the same file.
[[file]]
src = "AGENTS.md.base"
dst = "AGENTS.md"
how = "merge-section"
when = "always"
marker = { begin = "<!-- kata:agents:base:begin -->", end = "<!-- kata:agents:base:end -->" }

[[file]]
src = "CLAUDE.md"
how = "overwrite"
when = "always"

[[file]]
src = "GEMINI.md"
how = "overwrite"
when = "always"

# opencode shim — same thin wrapper pointing back to AGENTS.md.
[[file]]
src = "OPENCODE.md"
how = "overwrite"
when = "always"

# Common .gitignore patterns. Kept inside a marker block so each
# project can append its own `.gitignore` lines outside the block
# without `kata apply` clobbering them.
[[file]]
src = ".gitignore.base"
dst = ".gitignore"
how = "merge-section"
when = "always"
marker = { begin = "# kata:gitignore:base:begin", end = "# kata:gitignore:base:end" }

# Common .gitattributes patterns. Same marker-section convention as
# .gitignore — projects can add their own attribute rules outside
# the kata block. The shipped block normalizes every text file to
# LF on commit (`* text=auto eol=lf`) so Windows-side writers
# (apm install, future tools) can't leak CRLF into the repo.
[[file]]
src = ".gitattributes.base"
dst = ".gitattributes"
how = "merge-section"
when = "always"
marker = { begin = "# kata:gitattributes:base:begin", end = "# kata:gitattributes:base:end" }

# APM consumer config. Tera-rendered so `name:` matches the
# project's directory name. Static otherwise — the only reason
# yukimemi/* projects ship apm.yml is to vendor the renri skill.
# `dst` is spelled out even though kata's `.tera` opt-in
# convention would derive the same name; explicit reads better.
#
# `when = "once"` — first apply writes the consumer-default form,
# subsequent applies honour `once_applied = true` in
# `.kata/applied.toml` and skip. This lets *publisher* repos
# (yukimemi/renri being the canonical example) keep a hand-edited
# `apm.yml` with a real `version` and an empty
# `dependencies.apm: []` after one of two routes:
#   (a) restore the publisher form post-init and rely on
#       `once_applied = true` to keep it stable, or
#   (b) skip the bootstrap apm.yml on a fresh init for
#       publishers (workflow-side decision).
# Consumers who want to pick up future apm.yml.tera enhancements
# can `rm apm.yml && kata apply` to retrigger the once-write.
[[file]]
src = "apm.yml.tera"
dst = "apm.yml"
how = "overwrite"
when = "once"

# Seed the `apm install` output so a fresh `kata apply` doesn't
# leave the working tree in a state that every `renri add` (which
# runs `apm install --update` as a post_create hook) immediately
# dirties with untracked SKILL.md / lock-file additions. `when =
# "once"` because consumers are expected to bump these via
# `apm install --update` (and commit the bump if they want it
# pinned); kata only seeds the initial state.
#
# `.agents/skills/renri/SKILL.md` and `.claude/skills/renri/SKILL.md`
# are byte-identical (apm copies the same SKILL.md to every
# requested target). Shipped as separate paths because each
# agent (Claude Code, Codex, …) loads from its own dir.
[[file]]
src = "apm.lock.yaml"
how = "overwrite"
when = "once"

[[file]]
src = ".agents/skills/renri/SKILL.md"
how = "overwrite"
when = "once"

[[file]]
src = ".claude/skills/renri/SKILL.md"
how = "overwrite"
when = "once"

# renri worktree config. Language-agnostic baseline: a single
# post_create hook that runs `apm install --update` so every
# fresh worktree picks up the latest renri skill. Language layers
# (pj-rust, pj-go, pj-bun) overwrite this file with a richer
# hook that delegates to their build-system's on-add task.
# Source name carries the `.base` suffix for symmetry with
# `AGENTS.md.base` / `.gitignore.base` — same convention: layer
# suffix on every src that participates in compose conflicts.
[[file]]
src = "renri.toml.base"
dst = "renri.toml"
how = "overwrite"
when = "always"

# Gemini CLI settings — grant access to ~/wt so that worktrees
# created by renri (which live under ~/wt) are reachable by the
# Gemini agent. Applied as a project-level settings file so every
# yukimemi/* project automatically inherits the permission.
[[file]]
src = ".gemini/settings.json"
dst = ".gemini/settings.json"
how = "overwrite"
when = "always"

# opencode settings — same rationale as Gemini above: allow the
# agent to read/write files inside renri worktrees under ~/wt.
# Uses `permission.external_directory` (opencode's mechanism),
# written as project-level `opencode.json`.
[[file]]
src = "opencode.json"
dst = "opencode.json"
how = "overwrite"
when = "always"
